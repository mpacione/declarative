# Experiment I — per-canonical-type sizing defaults
# Generated from Dank-EXP-02 (204 app_screens, 79,833 nodes).
#
# Classification: derive_canonical_type (dd/catalog.py aliases) + 
# apply_heuristic_rules (dd/classify_rules.py). This replicates what
# screen_component_instances would contain — the SCI table is empty
# in this DB because the formal classification stage hasn't been run.
#
# Types with < 10 Dank instances are flagged `data: insufficient`
# and should be backfilled from Exp H (public design-system defaults).
#
# Units: pixels (Figma logical). Sizing modes per Figma: FIXED | HUG | FILL.
# The 'value' field is the median; the 'min'/'max' bracket is p25-p95.

